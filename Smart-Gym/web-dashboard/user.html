<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymOS | My Progress</title>
    <link rel="stylesheet" href="style.css?v=4.0">
</head>
<body>
    <div class="admin-container">
        <!-- Top Navigation -->
        <header class="top-bar">
            <div class="brand">
                <h1>Gym<span style="color: var(--accent-primary);">OS</span> <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-left: 8px;">My Progress</span></h1>
            </div>
            <div class="nav-links" style="display: flex; gap: 24px; align-items: center;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div id="user-avatar-small" class="member-avatar" style="width: 32px; height: 32px; font-size: 0.8rem;">?</div>
                    <span id="user-name-title" style="font-weight: 600; font-size: 0.9rem;">Loading...</span>
                </div>
                <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;">Back to Kiosk</a>
                <button class="btn btn-secondary" onclick="userLogout()">Sign Out</button>
            </div>
        </header>

        <!-- Personal Metrics -->
        <div class="stats-grid" id="user-summary">
            <div class="stat-box">
                <div class="stat-box-value" id="total-visits">0</div>
                <div class="stat-box-label">Gym Sessions</div>
            </div>
            <div class="stat-box" style="border-color: var(--accent-primary);">
                <div class="stat-box-value" id="total-reps" style="color: var(--accent-primary);">0</div>
                <div class="stat-box-label">Lifetime Reps</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="avg-form" style="color: var(--accent-secondary);">0%</div>
                <div class="stat-box-label">Avg Form Score</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="member-status" style="font-size: 1.2rem; text-transform: capitalize;">...</div>
                <div class="stat-box-label">Membership Status</div>
            </div>
        </div>

        <!-- Activity Timeline -->
        <main style="margin-top: 32px;">
            <div class="metric-card" style="padding: 0;">
                <div style="padding: 24px 32px; border-bottom: 1px solid var(--border-light);">
                    <h2 style="font-family: 'Outfit'; font-weight: 800; font-size: 1.5rem; margin: 0;">Workout History</h2>
                </div>
                
                <div id="history-list" style="display: flex; flex-direction: column;">
                    <div style="padding: 80px; text-align: center; color: var(--text-muted);">
                        Loading your fitness journey...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="user.js"></script>
</body>
</html>
