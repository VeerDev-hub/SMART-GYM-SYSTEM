<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymOS | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css?v=4.0">
</head>
<body>
    <div class="admin-container">
        <!-- Top Navigation -->
        <header class="top-bar">
            <div class="brand">
                <h1>Gym<span style="color: var(--accent-primary);">OS</span> <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-left: 8px;">Admin Dashboard</span></h1>
            </div>
            <div class="nav-links" style="display: flex; gap: 16px; align-items: center;">
                <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;">Live Kiosk</a>
                <button class="btn btn-secondary" onclick="logout()">Sign Out</button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid" id="admin-stats">
            <div class="stat-box">
                <div class="stat-box-value" id="stat-total-members">0</div>
                <div class="stat-box-label">Total Members</div>
            </div>
            <div class="stat-box" style="border-color: var(--accent-primary);">
                <div class="stat-box-value" id="stat-active-now" style="color: var(--accent-primary);">0</div>
                <div class="stat-box-label">Active Workouts</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="stat-logs">0</div>
                <div class="stat-box-label">Today's Visits</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="stat-machines">0</div>
                <div class="stat-box-label">Machines in Use</div>
            </div>
        </div>

        <!-- System Grid -->
        <main class="grid-layout">
            
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <!-- Member Management -->
                <section class="metric-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <span class="metric-card-title" style="margin-bottom: 0;">Member Directory</span>
                        <button class="btn btn-primary" onclick="showAddModal()">+ Add Member</button>
                    </div>
                    <div id="member-list" style="max-height: 400px; overflow-y: auto;">
                        <div style="padding: 40px; color: var(--text-muted); text-align: center;">Loading member data...</div>
                    </div>
                </section>

                <!-- Live Telemetry -->
                <section class="metric-card">
                    <span class="metric-card-title">Live Machine Activity</span>
                    <div id="active-sessions-table" style="margin-top: 16px;">
                        <div style="padding: 40px; color: var(--text-muted); text-align: center;">Scanning machines...</div>
                    </div>
                </section>
            </div>

            <!-- Security Logs -->
            <section class="metric-card">
                <span class="metric-card-title">Access Log</span>
                <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                    <input type="text" id="manual-entrance-rfid" class="rfid-manual-input" placeholder="Enter RFID manually">
                    <button class="btn btn-secondary" onclick="handleManualEntrance()">Grant</button>
                </div>
                <div id="access-logs" style="max-height: 600px; overflow-y: auto;">
                    <div style="padding: 40px; color: var(--text-muted); text-align: center;">Loading access logs...</div>
                </div>
            </section>
            
        </main>
    </div>

    <!-- Add Member Modal -->
    <div id="add-modal" style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center;">
        <div class="metric-card" style="width: 100%; max-width: 500px; padding: 40px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <h2 style="font-family: 'Outfit'; font-weight: 800; font-size: 1.5rem;">Add New Member</h2>
                <button onclick="hideAddModal()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.5rem;">&times;</button>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div>
                    <label style="display:block; margin-bottom:8px; font-size:0.8rem; font-weight:600; color:var(--text-muted);">Full Name</label>
                    <input type="text" id="new-name" class="rfid-manual-input" placeholder="Jane Doe">
                </div>
                <div>
                    <label style="display:block; margin-bottom:8px; font-size:0.8rem; font-weight:600; color:var(--text-muted);">Email Address</label>
                    <input type="email" id="new-email" class="rfid-manual-input" placeholder="jane@example.com">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.8rem; font-weight:600; color:var(--text-muted);">RFID Card Tag</label>
                        <input type="text" id="new-rfid" class="rfid-manual-input" placeholder="e.g. 1A2B3C">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.8rem; font-weight:600; color:var(--text-muted);">Username</label>
                        <input type="text" id="new-user" class="rfid-manual-input" placeholder="janedoe">
                    </div>
                </div>
                <div>
                    <label style="display:block; margin-bottom:8px; font-size:0.8rem; font-weight:600; color:var(--text-muted);">Password</label>
                    <input type="password" id="new-pass" class="rfid-manual-input" placeholder="••••••••">
                </div>

                <div style="display: flex; gap: 16px; margin-top: 16px;">
                    <button class="btn btn-primary" style="flex: 2;" onclick="addMember()">Save Member</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="hideAddModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
