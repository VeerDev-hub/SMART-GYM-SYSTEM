<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gym | Admin Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <!-- Top Navigation -->
        <header class="top-bar">
            <div class="brand">
                <h1>ADMIN<span>CONSOLE</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Live Dashboard</a>
                <button onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid" id="admin-stats">
            <div class="stat-box">
                <div class="stat-box-value" id="stat-total-members">0</div>
                <div class="stat-box-label">Total Members</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="stat-active-now">0</div>
                <div class="stat-box-label">Active Now</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="stat-logs">0</div>
                <div class="stat-box-label">Entrance Logs</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="stat-machines">0</div>
                <div class="stat-box-label">Machines Active</div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <main class="grid-layout">
            
            <!-- Member Directory -->
            <section class="metric-card col-span-2">
                <div class="card-header">
                    <span class="card-title">Member Directory</span>
                    <button class="btn btn-primary" onclick="showAddModal()">+ Add Member</button>
                </div>
                <div id="member-list" style="max-height: 400px; overflow-y: auto;">
                    <div style="padding: 20px; color: var(--text-muted); text-align: center;">Syncing directory...</div>
                </div>
            </section>

            <!-- Access Logs -->
            <section class="metric-card">
                <div class="card-header">
                    <span class="card-title">Recent Access</span>
                </div>
                <div style="display: flex; gap: 8px; margin-bottom: 15px;">
                    <input type="text" id="manual-entrance-rfid" class="form-control" placeholder="HEX Override" style="padding: 8px; font-size: 0.8rem;">
                    <button class="btn btn-primary" style="padding: 8px 12px; font-size: 0.8rem;" onclick="handleManualEntrance()">Log</button>
                </div>
                <div id="access-logs" style="max-height: 350px; overflow-y: auto;">
                    <div style="padding: 20px; color: var(--text-muted); text-align: center;">Monitoring gate...</div>
                </div>
            </section>

            <!-- Live Sessions -->
            <section class="metric-card col-span-3">
                <div class="card-header">
                    <span class="card-title">Live Machine Sessions</span>
                </div>
                <div id="active-sessions-table">
                    <div style="padding: 20px; color: var(--text-muted); text-align: center;">Listening to telemetry...</div>
                </div>
            </section>
            
        </main>
    </div>

    <!-- Add Member Modal -->
    <div id="add-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div class="auth-card" style="width: 100%; max-width: 450px;">
            <div class="card-header">
                <span class="card-title">Enroll New Member</span>
            </div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="new-name" class="form-control" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="new-email" class="form-control" placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>RFID Card UID (HEX)</label>
                <input type="text" id="new-rfid" class="form-control" placeholder="e.g. 53BEA9FA">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="new-user" class="form-control" placeholder="johndoe123">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="new-pass" class="form-control" placeholder="••••••••">
            </div>

            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="addMember()">Create</button>
                <button class="btn" style="flex: 1;" onclick="hideAddModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
