<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymOS | Subject Portal</title>
    <link rel="stylesheet" href="style.css?v=3.0">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-black);">
    <div class="metric-card" style="width: 100%; max-width: 400px; padding: 50px 40px; text-align: center; border-color: var(--cyan);">
        <div class="brand" style="margin-bottom: 40px;">
            <h1 style="font-size: 2rem;">MY<span>JOURNEY</span></h1>
            <p style="font-size: 0.7rem; color: var(--text-dim); letter-spacing: 3px; margin-top: 10px; text-transform: uppercase;">Personnel Access Terminal</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 24px;">
            <div style="background: rgba(0, 229, 255, 0.03); border: 1px dashed var(--cyan-glow); padding: 30px; border-radius: 20px;">
                <div class="live-dot-small" style="background: var(--cyan); box-shadow: 0 0 10px var(--cyan); margin: 0 auto 15px;"></div>
                <p style="font-size: 0.9rem; font-weight: 600; color: #fff;">Please tap your RFID card</p>
                <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;">Awaiting secure transmission...</p>
            </div>

            <div style="height: 1px; background: var(--border-glass); position: relative; margin: 10px 0;">
                <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-card); padding: 0 10px; font-size: 0.6rem; color: var(--text-dim); font-weight: 800;">OR MANUAL OVERRIDE</span>
            </div>

            <div style="text-align: left;">
                <label style="display:block; margin-bottom:8px; font-size:0.65rem; font-weight:700; color:var(--text-dim); letter-spacing: 1px;">SYSTEM UID (RFID)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="rfid-input" class="rfid-manual-input" placeholder="HEX CODE" style="flex: 1; font-size: 0.85rem;">
                    <button id="login-btn" class="btn btn-primary" onclick="handleRfidLogin()" style="padding: 0 20px;">Link</button>
                </div>
            </div>
            
            <div id="login-error" style="display:none; color: var(--rose); font-size: 0.8rem; text-align: center; margin-top: 5px; font-weight: 600;">
                Subject not found in registry.
            </div>
        </div>

        <div style="margin-top: 40px; border-top: 1px solid var(--border-glass); padding-top: 20px;">
            <a href="index.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.8rem; font-weight: 600;">Back to Operations</a>
        </div>
    </div>

    <script>
        // The BACKEND_URL dynamically resolves based on the browser's current address
        const BACKEND_URL = `http://${window.location.hostname}:8080`;
        async function handleRfidLogin() {
            const rfid = document.getElementById('rfid-input').value.trim();
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('login-error');

            if (!rfid) return;

            btn.innerText = "...";
            btn.disabled = true;
            error.style.display = 'none';

            try {
                const response = await fetch(`${BACKEND_URL}/auth/rfid-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rfid_uid: rfid })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('gymUserToken', data.access_token);
                    window.location.href = "user.html";
                } else {
                    error.style.display = 'block';
                }
            } catch (err) {
                alert(`Comm-link failure to ${BACKEND_URL}. Check node connection.`);
            } finally {
                btn.innerText = "Link";
                btn.disabled = false;
            }
        }

        // Allow Enter key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRfidLogin();
        });
    </script>
</body>
</html>
